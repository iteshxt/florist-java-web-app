name: Maven Build & Docker Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: mvn clean package
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/florist-app:${{ github.ref_name }}-${{ github.sha }}
          ${{ secrets.DOCKER_USERNAME }}/florist-app:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/florist-app:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/florist-app:buildcache,mode=max
    
    - name: Run Docker container for testing
      run: |
        docker run -d --name florist-test -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/florist-app:latest
        sleep 5
        curl -f http://localhost:8080/ || exit 1
        docker stop florist-test
    
    - name: Publish test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: target/
